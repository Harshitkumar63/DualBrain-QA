services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid_llm_backend
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/data
      - PEFT_MODEL_PATH=/app/models/adapters
      - BASE_MODEL_NAME=TinyLlama/TinyLlama-1.1B-Chat-v1.0
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid_llm_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./data:/app/data
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped
